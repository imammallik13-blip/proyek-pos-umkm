<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Staff — Warung Nasi Mak Fatih</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#1C130B;
    --kertas:#F3E7D2;
    --kertas-terang:#FBF4E6;
    --coklat-tua:#3B2617;
    --coklat-sedang:#7A4A24;
    --emas:#C8992E;
    --emas-redup:rgba(200,153,46,0.35);
    --merah-bata:#A83B2A;
    --hijau-pisang:#3E5C3A;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html, body{ height:100%; }

  body{
    font-family:'Montserrat', sans-serif;
    background:
      radial-gradient(ellipse 900px 600px at 50% 0%, rgba(200,153,46,0.10), transparent 60%),
      radial-gradient(ellipse 1200px 800px at 50% 100%, rgba(59,38,23,0.6), transparent 60%),
      var(--bg);
    color:var(--kertas);
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }

  /* Serat kayu halus di background */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:repeating-linear-gradient(
      95deg,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.3em;
    color:var(--emas);
    text-align:center;
    margin-bottom:14px;
    text-transform:uppercase;
  }

  .wrap{
    width:100%;
    max-width:400px;
    position:relative;
    z-index:1;
  }

  .mangkuk{
    text-align:center;
    font-size:2.4rem;
    margin-bottom:6px;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4));
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:800;
    font-size:1.7rem;
    text-align:center;
    color:var(--kertas-terang);
    line-height:1.2;
    margin-bottom:6px;
  }

  .subjudul{
    text-align:center;
    font-size:0.85rem;
    color:rgba(243,231,210,0.55);
    margin-bottom:30px;
  }

  /* Kartu kertas nasi */
  .kartu{
    background:var(--kertas);
    border-radius:4px;
    padding:32px 26px 28px;
    position:relative;
    box-shadow:0 24px 60px -20px rgba(0,0,0,0.6), 0 2px 0 rgba(0,0,0,0.15);
    transform:rotate(-0.4deg);
  }

  .kartu::before{
    content:'';
    position:absolute;
    top:-10px; left:50%;
    transform:translateX(-50%) rotate(-3deg);
    width:70px; height:22px;
    background:rgba(200,153,46,0.35);
    border:1px solid rgba(200,153,46,0.5);
  }

  .kartu.goyang{
    animation:goyangSalah 0.45s ease;
  }
  @keyframes goyangSalah{
    0%,100%{ transform:rotate(-0.4deg) translateX(0); }
    20%{ transform:rotate(-0.4deg) translateX(-8px); }
    40%{ transform:rotate(-0.4deg) translateX(7px); }
    60%{ transform:rotate(-0.4deg) translateX(-5px); }
    80%{ transform:rotate(-0.4deg) translateX(3px); }
  }

  .field{
    margin-bottom:20px;
  }

  .field label{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--coklat-sedang);
    margin-bottom:7px;
  }

  .field-input-wrap{
    position:relative;
    display:flex;
    align-items:center;
  }

  .field input{
    width:100%;
    font-family:'Montserrat', sans-serif;
    font-size:0.95rem;
    color:var(--coklat-tua);
    background:transparent;
    border:none;
    border-bottom:1.5px solid rgba(122,74,36,0.35);
    padding:8px 2px;
    outline:none;
    transition:border-color 0.2s ease;
  }

  .field input::placeholder{ color:rgba(122,74,36,0.4); }

  .field input:focus{
    border-bottom-color:var(--merah-bata);
  }

  .field input:focus-visible{
    outline:2px solid var(--emas);
    outline-offset:3px;
  }

  .toggle-mata{
    position:absolute;
    right:2px;
    background:none;
    border:none;
    cursor:pointer;
    font-size:0.95rem;
    color:var(--coklat-sedang);
    padding:6px;
    line-height:1;
  }
  .toggle-mata:focus-visible{
    outline:2px solid var(--emas);
    border-radius:3px;
  }

  .pesan-error{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color:var(--merah-bata);
    background:rgba(168,59,42,0.1);
    border:1px solid rgba(168,59,42,0.3);
    padding:9px 11px;
    border-radius:3px;
    margin-bottom:18px;
    display:none;
    line-height:1.5;
  }
  .pesan-error.tampil{ display:block; }

  .btn-masuk{
    width:100%;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:0.85rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--kertas-terang);
    background:var(--merah-bata);
    border:none;
    border-radius:3px;
    padding:14px;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.1s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .btn-masuk:hover:not(:disabled){ background:#8f3223; }
  .btn-masuk:active:not(:disabled){ transform:scale(0.98); }
  .btn-masuk:disabled{ opacity:0.7; cursor:wait; }
  .btn-masuk:focus-visible{ outline:2px solid var(--emas); outline-offset:3px; }

  .titik-muat{
    display:inline-flex;
    gap:4px;
  }
  .titik-muat span{
    width:5px; height:5px;
    border-radius:50%;
    background:var(--kertas-terang);
    animation:titikNaik 1s infinite ease-in-out;
  }
  .titik-muat span:nth-child(2){ animation-delay:0.15s; }
  .titik-muat span:nth-child(3){ animation-delay:0.3s; }
  @keyframes titikNaik{
    0%,80%,100%{ transform:translateY(0); opacity:0.5; }
    40%{ transform:translateY(-4px); opacity:1; }
  }

  .footer-note{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    color:rgba(243,231,210,0.3);
    margin-top:22px;
    letter-spacing:0.02em;
  }

  .cek-sesi{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:0.8rem;
    color:rgba(243,231,210,0.5);
  }

  /* --- Stempel: elemen signature --- */
  .overlay-stempel{
    position:fixed;
    inset:0;
    background:rgba(28,19,11,0.88);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .overlay-stempel.tampil{ display:flex; }

  .stempel{
    width:190px; height:190px;
    border-radius:50%;
    border:5px double var(--emas);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:var(--emas);
    font-family:'JetBrains Mono', monospace;
    text-align:center;
    transform:scale(2.2) rotate(-18deg);
    opacity:0;
    box-shadow:0 0 0 0 rgba(200,153,46,0);
    animation:capStempel 0.55s cubic-bezier(.2,.8,.3,1.3) forwards;
  }
  @keyframes capStempel{
    0%{ transform:scale(2.2) rotate(-18deg); opacity:0; }
    60%{ transform:scale(0.92) rotate(-4deg); opacity:1; box-shadow:0 0 40px 6px rgba(200,153,46,0.35); }
    100%{ transform:scale(1) rotate(-6deg); opacity:1; box-shadow:0 0 24px 2px rgba(200,153,46,0.2); }
  }
  .stempel .cek{ font-size:2.1rem; margin-bottom:2px; }
  .stempel .label-role{
    font-weight:700;
    font-size:0.95rem;
    letter-spacing:0.08em;
  }
  .stempel .label-sub{
    font-size:0.6rem;
    letter-spacing:0.15em;
    opacity:0.75;
    margin-top:3px;
  }

  @media (prefers-reduced-motion: reduce){
    .kartu.goyang, .stempel, .titik-muat span{ animation:none !important; }
  }

  @media (max-width:360px){
    .kartu{ padding:26px 20px 24px; }
    h1{ font-size:1.45rem; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="eyebrow">Portal Staff</div>
    <div class="mangkuk">🍚</div>
    <h1>Warung Nasi Mak Fatih</h1>
    <p class="subjudul">Masuk untuk melanjutkan ke sistem</p>

    <div class="kartu" id="kartu">

      <!-- Ditampilkan sebentar saat mengecek sesi login yang mungkin masih aktif -->
      <div class="cek-sesi" id="cekSesi">Memeriksa sesi login…</div>

      <form id="formLogin" style="display:none;" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <div class="field-input-wrap">
            <input type="email" id="email" placeholder="staff@warungmakfatih.com" required autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label for="password">Kata Sandi</label>
          <div class="field-input-wrap">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-mata" id="toggleMata" aria-label="Tampilkan kata sandi">👁</button>
          </div>
        </div>

        <div class="pesan-error" id="pesanError"></div>

        <button type="submit" class="btn-masuk" id="btnMasuk">
          <span id="teksTombol">Masuk</span>
        </button>
      </form>
    </div>

    <p class="footer-note">Sistem internal warung — bukan halaman pelanggan</p>
  </div>

  <!-- Overlay stempel: muncul sesaat setelah login berhasil, sebelum diarahkan -->
  <div class="overlay-stempel" id="overlayStempel">
    <div class="stempel" id="stempel">
      <div class="cek">✓</div>
      <div class="label-role" id="labelRole">TERVERIFIKASI</div>
      <div class="label-sub">MENGARAHKAN…</div>
    </div>
  </div>

<script>
  const SUPABASE_URL = 'https://hziarikfceeirvcsoplj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_qDKJzMXurd-bfr1LhsYHMg_sGbDMI22';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Halaman tujuan tiap role. "kasir" dan "kitchen" untuk sementara
  // sama-sama diarahkan ke KDS karena kasir.html belum dibuat —
  // tinggal ganti baris 'kasir' begitu file itu sudah ada.
  const PETA_REDIRECT = {
    owner:   'Dashboard_Warung_Nasi_Mak_Fatih.html',
    kasir:   'kasir.html',
    kitchen: 'KDS_Warung_Nasi_Mak_Fatih.html'
  };

  const LABEL_ROLE = {
    owner:   'OWNER',
    kasir:   'KASIR',
    kitchen: 'DAPUR'
  };

  const cekSesiEl   = document.getElementById('cekSesi');
  const formEl      = document.getElementById('formLogin');
  const kartuEl     = document.getElementById('kartu');
  const pesanError  = document.getElementById('pesanError');
  const btnMasuk    = document.getElementById('btnMasuk');
  const teksTombol  = document.getElementById('teksTombol');
  const overlayStempel = document.getElementById('overlayStempel');
  const labelRoleEl = document.getElementById('labelRole');

  // --- Ambil role dari tabel profiles berdasarkan id user yang login ---
  async function ambilRole(userId){
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('role_user')
      .eq('id', userId)
      .single();

    if (error || !data) return null;
    return data.role_user;
    return data.role_user.trim().toLowerCase();
  }

  function tampilkanStempelLaluRedirect(role){
    const label = LABEL_ROLE[role] || role.toUpperCase();
    labelRoleEl.textContent = label;
    overlayStempel.classList.add('tampil');

    const tujuan = PETA_REDIRECT[role];
    setTimeout(() => {
      if (tujuan){
        window.location.href = tujuan;
      } else {
        overlayStempel.classList.remove('tampil');
        tampilkanError('Role "' + role + '" belum punya halaman tujuan. Hubungi admin.');
      }
    }, 1100);
  }

  function tampilkanError(pesan){
    pesanError.textContent = pesan;
    pesanError.classList.add('tampil');
    kartuEl.classList.remove('goyang');
    // trigger reflow biar animasi bisa diulang walau class sama
    void kartuEl.offsetWidth;
    kartuEl.classList.add('goyang');
  }

  function aturTombolMemuat(memuat){
    btnMasuk.disabled = memuat;
    teksTombol.innerHTML = memuat
      ? 'Memeriksa <span class="titik-muat"><span></span><span></span><span></span></span>'
      : 'Masuk';
  }

  // --- Cek sesi aktif saat halaman dibuka ---
  async function cekSesiAktif(){
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session){
      cekSesiEl.style.display = 'none';
      formEl.style.display = 'block';
      return;
    }

    const role = await ambilRole(session.user.id);
    if (role && PETA_REDIRECT[role]){
      cekSesiEl.textContent = 'Sesi ditemukan, mengarahkan…';
      tampilkanStempelLaluRedirect(role);
    } else {
      // Sesi ada tapi tidak ketemu profile/role -> paksa login ulang
      await supabaseClient.auth.signOut();
      cekSesiEl.style.display = 'none';
      formEl.style.display = 'block';
    }
  }

  // --- Submit form login ---
  formEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    pesanError.classList.remove('tampil');
    aturTombolMemuat(true);

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error){
      aturTombolMemuat(false);
      tampilkanError('Email atau kata sandi salah. Coba periksa lagi.');
      return;
    }

    const role = await ambilRole(data.user.id);
    aturTombolMemuat(false);

    if (!role){
      tampilkanError('Akun ini belum terdaftar sebagai staff. Hubungi owner.');
      await supabaseClient.auth.signOut();
      return;
    }

    tampilkanStempelLaluRedirect(role);
  });

  // --- Toggle lihat/sembunyikan kata sandi ---
  document.getElementById('toggleMata').addEventListener('click', () => {
    const inputPass = document.getElementById('password');
    const jadiTeks = inputPass.type === 'password';
    inputPass.type = jadiTeks ? 'text' : 'password';
    document.getElementById('toggleMata').textContent = jadiTeks ? '🙈' : '👁';
  });

  cekSesiAktif();
</script>
</body>
</html>
