<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Warung Nasi Mak Fatih</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Montserrat:wght@400;500;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --coklat-tua:#3B2617;
    --coklat-sedang:#7A4A24;
    --krem-kertas:#F3E7D2;
    --krem-terang:#FBF4E6;
    --merah-bata:#A83B2A;
    --merah-bata-gelap:#7E2A1E;
    --hijau-pisang:#3E5C3A;
    --emas:#C8992E;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body{
    max-width:100%;
    overflow-x:hidden;
  }
  body{
    background-color:var(--krem-kertas);
    font-family:'Montserrat', sans-serif;
    color:var(--coklat-tua);
    padding-bottom:60px;
  }
  h1,h2,h3{font-family:'Fraunces', serif;}
  header{
    background-color:var(--coklat-tua);
    color:var(--krem-terang);
    padding:20px 26px;
    border-bottom:3px solid var(--emas);
    position:sticky;
    top:0;
    z-index:10;
    
    .header-flex{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}
.btn-logout{
  font-family:'Montserrat', sans-serif;
  font-weight:600;
  font-size:0.78rem;
  color:var(--krem-terang);
  background:transparent;
  border:1.5px solid var(--merah-bata);
  border-radius:6px;
  padding:8px 16px;
  cursor:pointer;
  transition:all .15s ease;
  white-space:nowrap;
}
.btn-logout:hover{
  background:var(--merah-bata);
}
    
  }
  header h1{font-size:1.3rem; font-weight:900;}
  .container{max-width:960px; margin:0 auto; padding:0 20px;}

  .tabs{
    display:flex;
    gap:10px;
    margin:22px 0;
  }
  .tab-btn{
    flex:1;
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:0.95rem;
    padding:12px 10px;
    border:1.5px solid var(--coklat-sedang);
    border-radius:8px;
    background-color:var(--krem-terang);
    color:var(--coklat-tua);
    cursor:pointer;
  }
  .tab-btn.aktif{
    background-color:var(--merah-bata);
    border-color:var(--merah-bata);
    color:white;
  }
  .panel{display:none;}
  .panel.aktif{display:block;}

  /* ===== LAPORAN PENJUALAN ===== */
  .filter-periode{
    margin-bottom:18px;
  }
  .preset-btns{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .preset-btn{
    font-family:'Montserrat', sans-serif;
    font-weight:600;
    font-size:0.78rem;
    padding:8px 14px;
    border:1.5px solid var(--coklat-sedang);
    border-radius:20px;
    background:var(--krem-terang);
    color:var(--coklat-tua);
    cursor:pointer;
    white-space:nowrap;
  }
  .preset-btn.aktif{
    background:var(--coklat-tua);
    border-color:var(--coklat-tua);
    color:var(--krem-terang);
  }
  .custom-range{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .custom-range input[type="date"]{
    font-family:'Montserrat', sans-serif;
    padding:7px 9px;
    border:1.5px solid var(--coklat-sedang);
    border-radius:5px;
    background:var(--krem-terang);
    color:var(--coklat-tua);
    font-size:0.8rem;
  }
  .custom-range span{font-size:0.78rem; color:var(--coklat-sedang);}
  .btn-terapkan{
    font-family:'Montserrat', sans-serif;
    font-weight:700;
    font-size:0.78rem;
    padding:7px 14px;
    border:none;
    border-radius:5px;
    background:var(--emas);
    color:var(--coklat-tua);
    cursor:pointer;
  }
  .btn-terapkan:hover{background:#b3872a;}

  .ringkasan{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:14px;
    margin-bottom:24px;
  }
  .kartu-ringkasan{
    background:var(--krem-terang);
    border:1.5px solid var(--coklat-sedang);
    border-top:4px solid var(--emas);
    border-radius:6px;
    padding:16px;
    text-align:center;
  }
  .kartu-ringkasan .label{font-size:0.75rem; color:var(--coklat-sedang); margin-bottom:6px;}
  .kartu-ringkasan .angka{font-family:'Fraunces', serif; font-weight:900; font-size:1.3rem; color:var(--merah-bata-gelap);}

  .blok{
    background:var(--krem-terang);
    border:1.5px solid var(--coklat-sedang);
    border-radius:6px;
    padding:18px;
    margin-bottom:20px;
  }
  .blok h3{font-size:1.05rem; margin-bottom:14px; color:var(--merah-bata-gelap);}

  .baris-terlaris{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    font-size:0.85rem;
  }
  .baris-terlaris .nama{width:130px; flex-shrink:0;}
  .bar-track{flex:1; background:var(--krem-kertas); border-radius:6px; height:16px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--emas);}
  .baris-terlaris .qty{width:60px; text-align:right; flex-shrink:0; font-weight:700;}

  /* ===== KELOLA MENU ===== */
  .form-tambah{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-bottom:10px;
  }
  .form-tambah input, .form-tambah select, .form-tambah textarea{
    font-family:'Montserrat', sans-serif;
    padding:9px 10px;
    border:1.5px solid var(--coklat-sedang);
    border-radius:5px;
    background:var(--krem-kertas);
    color:var(--coklat-tua);
    font-size:0.85rem;
  }
  .form-tambah textarea{grid-column:1/-1; resize:vertical; min-height:44px;}
  .btn-tambah{
    grid-column:1/-1;
    background:var(--hijau-pisang);
    color:white;
    border:none;
    padding:11px;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
    font-family:'Montserrat', sans-serif;
  }
  .btn-tambah:hover{background:#2e4a2b;}

  .daftar-menu-kelola{display:flex; flex-direction:column; gap:10px;}
  .baris-menu{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
    border:1.5px solid var(--coklat-sedang);
    border-radius:6px;
    padding:12px;
    background:var(--krem-kertas);
  }
  .baris-menu input, .baris-menu select, .baris-menu textarea{
    font-family:'Montserrat', sans-serif;
    padding:8px 9px;
    border:1px solid var(--coklat-sedang);
    border-radius:5px;
    background:var(--krem-terang);
    color:var(--coklat-tua);
    font-size:0.82rem;
  }
  .baris-menu textarea{grid-column:1/-1; resize:vertical; min-height:38px;}
  .aksi-menu{grid-column:1/-1; display:flex; gap:8px; margin-top:4px;}
  .aksi-menu button{
    flex:1;
    padding:9px;
    border-radius:5px;
    border:none;
    font-weight:700;
    cursor:pointer;
    font-family:'Montserrat', sans-serif;
    font-size:0.8rem;
  }
  .btn-simpan{background:var(--emas); color:var(--coklat-tua);}
  .btn-simpan:hover{background:#b3872a;}
  .btn-hapus{background:transparent; color:var(--merah-bata-gelap); border:1.5px solid var(--merah-bata-gelap) !important;}
  .btn-hapus:hover{background:rgba(168,59,42,0.1);}

  .status-teks{font-size:0.75rem; color:var(--coklat-sedang); margin-bottom:16px;}
  .kosong{text-align:center; padding:30px; color:var(--coklat-sedang); font-size:0.85rem;}

  /* ===== RESPONSIVE MOBILE ===== */
  @media (max-width: 640px) {
    .form-tambah {
      grid-template-columns: 1fr;
    }
    .form-tambah textarea {
      grid-column: 1 / -1;
    }
    .baris-menu {
      grid-template-columns: 1fr;
    }
    .baris-menu .f-deskripsi {
      grid-column: 1 / -1;
    }
  }
</style>
</head>
<body>

<header>
  <div class="container header-flex" style="padding:0;">
    <h1>📊 Dashboard — Warung Nasi Mak Fatih</h1>
    <button id="btnLogout" class="btn-logout">Keluar</button>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn aktif" data-panel="laporan" onclick="gantiPanel('laporan')">Laporan Penjualan</button>
    <button class="tab-btn" data-panel="menu" onclick="gantiPanel('menu')">Kelola Menu</button>
  </div>

  <!-- ===== PANEL LAPORAN PENJUALAN ===== -->
  <div class="panel aktif" id="panel-laporan">
    <div class="filter-periode">
      <div class="preset-btns">
        <button class="preset-btn aktif" data-preset="hari" onclick="gantiPeriode('hari')">Hari Ini</button>
        <button class="preset-btn" data-preset="minggu" onclick="gantiPeriode('minggu')">Minggu Ini</button>
        <button class="preset-btn" data-preset="bulan" onclick="gantiPeriode('bulan')">Bulan Ini</button>
        <button class="preset-btn" data-preset="custom" onclick="gantiPeriode('custom')">Pilih Tanggal</button>
      </div>
      <div class="custom-range" id="customRange" style="display:none;">
        <input type="date" id="tglMulai">
        <span>s/d</span>
        <input type="date" id="tglSelesai">
        <button class="btn-terapkan" onclick="terapkanCustomRange()">Terapkan</button>
      </div>
    </div>

    <p class="status-teks" id="statusLaporan">Memuat data...</p>

    <div class="ringkasan">
      <div class="kartu-ringkasan">
        <div class="label" id="labelOmzet">Omzet — Hari Ini</div>
        <div class="angka" id="totalOmzet">Rp0</div>
      </div>
      <div class="kartu-ringkasan">
        <div class="label" id="labelPesanan">Total Pesanan — Hari Ini</div>
        <div class="angka" id="totalPesanan">0</div>
      </div>
    </div>

    <div class="blok">
      <h3>🔥 Menu Terlaris</h3>
      <div id="daftarTerlaris"></div>
    </div>
  </div>

  <!-- ===== PANEL KELOLA MENU ===== -->
  <div class="panel" id="panel-menu">
    <p class="status-teks" id="statusMenu">Memuat menu...</p>

    <div class="blok">
      <h3>+ Tambah Menu Baru</h3>
      <div class="form-tambah">
        <input type="text" id="input-nama" placeholder="Nama menu">
        <input type="number" id="input-harga" placeholder="Harga (angka saja)">
        <select id="input-kategori">
          <option value="makanan">Makanan</option>
          <option value="minuman">Minuman</option>
          <option value="camilan">Camilan</option>
        </select>
        <input type="text" id="input-deskripsi" placeholder="Deskripsi singkat">
        <button class="btn-tambah" onclick="tambahMenu()">Tambah Menu</button>
      </div>
    </div>

    <div class="blok">
      <h3>Daftar Menu</h3>
      <div class="daftar-menu-kelola" id="daftarMenuKelola"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://hziarikfceeirvcsoplj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_qDKJzMXurd-bfr1LhsYHMg_sGbDMI22';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('btnLogout').addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
  window.location.href = 'login.html';
});

  function gantiPanel(nama){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('aktif', b.getAttribute('data-panel') === nama));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('aktif'));
    document.getElementById('panel-' + nama).classList.add('aktif');
  }

  function formatRupiah(angka){
    return 'Rp' + Number(angka || 0).toLocaleString('id-ID');
  }

  // ===================== LAPORAN PENJUALAN =====================
  let periodeAktif = 'hari'; // 'hari' | 'minggu' | 'bulan' | 'custom'

  function gantiPeriode(preset){
    periodeAktif = preset;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('aktif', b.getAttribute('data-preset') === preset));
    const customRangeEl = document.getElementById('customRange');

    if(preset === 'custom'){
      customRangeEl.style.display = 'flex';
      // Jangan langsung fetch — tunggu user isi tanggal & klik "Terapkan"
      return;
    }
    customRangeEl.style.display = 'none';
    muatLaporan();
  }

  function terapkanCustomRange(){
    const mulai = document.getElementById('tglMulai').value;
    const selesai = document.getElementById('tglSelesai').value;
    if(!mulai || !selesai){
      alert('Isi tanggal mulai dan selesai dulu ya.');
      return;
    }
    if(mulai > selesai){
      alert('Tanggal mulai gak boleh setelah tanggal selesai.');
      return;
    }
    muatLaporan();
  }

  // Hitung rentang waktu (start-end) berdasarkan periode aktif.
  // Dipakai buat query .gte()/.lte() ke Supabase, BUKAN filter di client —
  // ini yang benerin masalah fetch-all (dulu ambil semua histori pesanan
  // sekaligus tiap kali dashboard dibuka).
  function hitungRentangTanggal(){
    const sekarang = new Date();
    let mulai, selesai;

    if(periodeAktif === 'hari'){
      mulai = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate(), 0, 0, 0);
      selesai = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate(), 23, 59, 59, 999);
    } else if(periodeAktif === 'minggu'){
      const hari = sekarang.getDay(); // 0 = Minggu
      const geserKeSenin = (hari === 0 ? -6 : 1) - hari;
      mulai = new Date(sekarang);
      mulai.setDate(sekarang.getDate() + geserKeSenin);
      mulai.setHours(0, 0, 0, 0);
      selesai = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate(), 23, 59, 59, 999);
    } else if(periodeAktif === 'bulan'){
      mulai = new Date(sekarang.getFullYear(), sekarang.getMonth(), 1, 0, 0, 0);
      selesai = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate(), 23, 59, 59, 999);
    } else { // custom
      mulai = new Date(document.getElementById('tglMulai').value + 'T00:00:00');
      selesai = new Date(document.getElementById('tglSelesai').value + 'T23:59:59.999');
    }
    return { mulai, selesai };
  }

  function labelPeriode(){
    const opt = { day:'numeric', month:'short', year:'numeric' };
    if(periodeAktif === 'hari') return 'Hari Ini';
    if(periodeAktif === 'minggu') return 'Minggu Ini';
    if(periodeAktif === 'bulan') return 'Bulan Ini';
    const { mulai, selesai } = hitungRentangTanggal();
    return `${mulai.toLocaleDateString('id-ID', opt)} s/d ${selesai.toLocaleDateString('id-ID', opt)}`;
  }

  async function muatLaporan(){
    const statusEl = document.getElementById('statusLaporan');
    statusEl.textContent = 'Memuat data...';

    const { mulai, selesai } = hitungRentangTanggal();

    // Hanya hitung pesanan yang SUDAH DIBAYAR dan BUKAN status 'dibatalkan',
    // DIBATASI ke rentang tanggal yang dipilih (query di level DB, bukan
    // fetch-all lalu difilter di JS). .or() dengan status.is.null supaya
    // pesanan lama (sebelum kolom status ada / masih NULL) tetap kehitung —
    // kalau pakai .neq() polos, baris dengan status NULL ikut ke-exclude
    // juga (NULL != 'x' = UNKNOWN di SQL).
    const { data, error } = await supabaseClient
      .from('Pesanan')
      .select('*')
      .eq('dibayar', true)
      .or('status.is.null,status.neq.dibatalkan')
      .gte('created_at', mulai.toISOString())
      .lte('created_at', selesai.toISOString());

    if(error){
      console.error('Gagal ambil data pesanan:', JSON.stringify(error, null, 2));
      statusEl.innerHTML = `<span style="color:var(--merah-bata-gelap)">Gagal memuat data. Kode: ${error.code || '-'} — ${error.message || '-'}</span>`;
      return;
    }

    const pesanan = data || [];
    const teksLabel = labelPeriode();
    document.getElementById('labelOmzet').textContent = `Omzet — ${teksLabel}`;
    document.getElementById('labelPesanan').textContent = `Total Pesanan — ${teksLabel}`;
    statusEl.textContent = `Terakhir dimuat: ${new Date().toLocaleTimeString('id-ID')} • ${pesanan.length} pesanan valid (sudah dibayar, tidak dibatalkan)`;

    // Total omzet & menu terlaris — otomatis ikut kescope ke periode terpilih
    // juga, karena dihitung dari `pesanan` yang query-nya udah dibatasi tanggal.
    let totalOmzet = 0;
    const hitungMenu = {};

    pesanan.forEach(p => {
      totalOmzet += Number(p.total_harga || 0);

      let rincian = p.rincian_pesanan;
      if(typeof rincian === 'string'){
        try{ rincian = JSON.parse(rincian); } catch(e){ rincian = []; }
      }
      if(Array.isArray(rincian)){
        rincian.forEach(item => {
          hitungMenu[item.menu] = (hitungMenu[item.menu] || 0) + Number(item.qty || 0);
        });
      }
    });

    document.getElementById('totalOmzet').textContent = formatRupiah(totalOmzet);
    document.getElementById('totalPesanan').textContent = pesanan.length;

    // Menu terlaris (top 5)
    const terlaris = Object.entries(hitungMenu)
      .sort((a,b) => b[1] - a[1])
      .slice(0, 5);

    const maxQty = terlaris.length ? terlaris[0][1] : 1;
    const daftarTerlaris = document.getElementById('daftarTerlaris');

    if(terlaris.length === 0){
      daftarTerlaris.innerHTML = '<div class="kosong">Belum ada data penjualan.</div>';
    } else {
      daftarTerlaris.innerHTML = terlaris.map(([nama, qty]) => `
        <div class="baris-terlaris">
          <span class="nama">${nama}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${(qty/maxQty*100)}%"></div></div>
          <span class="qty">${qty}x</span>
        </div>
      `).join('');
    }
  }

  // ===================== KELOLA MENU =====================
  async function muatMenu(){
    const statusEl = document.getElementById('statusMenu');
    statusEl.textContent = 'Memuat menu...';

    const { data, error } = await supabaseClient
      .from('Data Warung')
      .select('*')
      .order('id', { ascending:true });

    if(error){
      console.error('Gagal ambil data menu:', JSON.stringify(error, null, 2));
      statusEl.innerHTML = `<span style="color:var(--merah-bata-gelap)">Gagal memuat menu. Kode: ${error.code || '-'} — ${error.message || '-'}</span>`;
      return;
    }

    statusEl.textContent = `${data.length} menu terdaftar`;

    const daftarEl = document.getElementById('daftarMenuKelola');
    if(!data || data.length === 0){
      daftarEl.innerHTML = '<div class="kosong">Belum ada menu. Tambahkan lewat form di atas.</div>';
      return;
    }

    daftarEl.innerHTML = data.map(m => `
      <div class="baris-menu" data-id="${m.id}">
        <input type="text" class="f-nama" value="${(m.nama_menu || '').replace(/"/g,'&quot;')}" placeholder="Nama menu">
        <input type="number" class="f-harga" value="${m.harga_menu || 0}" placeholder="Harga">
        <select class="f-kategori">
          <option value="makanan" ${m.kategori_menu === 'makanan' ? 'selected' : ''}>Makanan</option>
          <option value="minuman" ${m.kategori_menu === 'minuman' ? 'selected' : ''}>Minuman</option>
        </select>
        <input type="text" class="f-deskripsi" value="${(m.deskripsi_menu || '').replace(/"/g,'&quot;')}" placeholder="Deskripsi" style="grid-column:2/3;">
        <div class="aksi-menu">
          <button class="btn-simpan" onclick="simpanMenu(${m.id}, this)">Simpan Perubahan</button>
          <button class="btn-hapus" onclick="hapusMenu(${m.id}, this)">Hapus</button>
        </div>
      </div>
    `).join('');
  }

  async function tambahMenu(){
    const nama = document.getElementById('input-nama').value.trim();
    const harga = parseInt(document.getElementById('input-harga').value) || 0;
    const kategori = document.getElementById('input-kategori').value;
    const deskripsi = document.getElementById('input-deskripsi').value.trim();

    if(!nama || harga <= 0){
      alert('Isi nama menu dan harga (harus lebih dari 0) dulu ya.');
      return;
    }

    const { error } = await supabaseClient
      .from('Data Warung')
      .insert([{ nama_menu: nama, harga_menu: harga, deskripsi_menu: deskripsi, kategori_menu: kategori }]);

    if(error){
      console.error('Gagal tambah menu:', JSON.stringify(error, null, 2));
      alert('Gagal tambah menu.\nPesan: ' + (error.message || '-') + '\nKode: ' + (error.code || '-'));
      return;
    }

    document.getElementById('input-nama').value = '';
    document.getElementById('input-harga').value = '';
    document.getElementById('input-deskripsi').value = '';
    muatMenu();
  }

  async function simpanMenu(id, tombol){
    const baris = tombol.closest('.baris-menu');
    const nama = baris.querySelector('.f-nama').value.trim();
    const harga = parseInt(baris.querySelector('.f-harga').value) || 0;
    const kategori = baris.querySelector('.f-kategori').value;
    const deskripsi = baris.querySelector('.f-deskripsi').value.trim();

    tombol.textContent = 'Menyimpan...';
    tombol.disabled = true;

    const { error } = await supabaseClient
      .from('Data Warung')
      .update({ nama_menu: nama, harga_menu: harga, deskripsi_menu: deskripsi, kategori_menu: kategori })
      .eq('id', id);

    tombol.textContent = 'Simpan Perubahan';
    tombol.disabled = false;

    if(error){
      console.error('Gagal update menu:', JSON.stringify(error, null, 2));
      alert('Gagal simpan perubahan.\nPesan: ' + (error.message || '-') + '\nKode: ' + (error.code || '-'));
      return;
    }
    tombol.textContent = 'Tersimpan ✓';
    setTimeout(() => { tombol.textContent = 'Simpan Perubahan'; }, 1500);
  }

  async function hapusMenu(id, tombol){
    if(!confirm('Yakin mau hapus menu ini?')) return;

    tombol.textContent = 'Menghapus...';
    tombol.disabled = true;

    const { error } = await supabaseClient
      .from('Data Warung')
      .delete()
      .eq('id', id);

    if(error){
      console.error('Gagal hapus menu:', JSON.stringify(error, null, 2));
      alert('Gagal hapus menu.\nPesan: ' + (error.message || '-') + '\nKode: ' + (error.code || '-'));
      tombol.textContent = 'Hapus';
      tombol.disabled = false;
      return;
    }
    muatMenu();
  }

  muatLaporan();
  muatMenu();
</script>
</body>
